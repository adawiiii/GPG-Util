name: "Build for Windows"

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
        shell: pwsh

      - name: Build (Release)
        run: cmake --build build --config Release --parallel
        shell: pwsh
